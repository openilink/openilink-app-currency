services:
  currency-app:
    build: .
    container_name: openilink-app-currency
    restart: unless-stopped
    environment:
      PORT: "${PORT:-8092}"
      HUB_URL: "${HUB_URL}"
      BASE_URL: "${BASE_URL}"
      DB_PATH: "/data/currency.db"
    volumes:
      - currency-data:/data

volumes:
  currency-data:
